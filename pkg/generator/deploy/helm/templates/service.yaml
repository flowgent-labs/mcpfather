apiVersion: v1
kind: Service
metadata:
  name: {{ include "__BINARY_NAME__.fullname" . }}
  labels:
    {{- include "__BINARY_NAME__.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.mgmtPort }}
      targetPort: mgmt
      protocol: TCP
      name: mgmt
  selector:
    {{- include "__BINARY_NAME__.selectorLabels" . | nindent 4 }}
