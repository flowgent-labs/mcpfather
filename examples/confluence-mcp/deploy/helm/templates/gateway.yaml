{{- if (include "confluence-mcp.useEnvoyGateway" .) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "confluence-mcp.fullname" . }}
  labels:
    {{- include "confluence-mcp.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.ingress.envoy.gatewayClassName }}
  listeners:
    {{- range .Values.ingress.envoy.hosts }}
    - name: {{ .host | replace "." "-" | replace "*" "wildcard" }}
      hostname: {{ .host | quote }}
      port: {{ $.Values.ingress.envoy.gatewayPort }}
      protocol: HTTP
      {{- if $.Values.ingress.envoy.tls }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ include "confluence-mcp.fullname" $ }}-tls
      {{- end }}
    {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "confluence-mcp.fullname" . }}
  labels:
    {{- include "confluence-mcp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "confluence-mcp.fullname" . }}
      port: {{ .Values.ingress.envoy.gatewayPort }}
  {{- range .Values.ingress.envoy.hosts }}
  hostnames:
    - {{ .host | quote }}
  {{- end }}
  rules:
    {{- range .Values.ingress.envoy.hosts }}
    {{- range .paths }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - name: {{ include "confluence-mcp.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
    {{- end }}
{{- end }}
